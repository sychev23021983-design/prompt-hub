# Значения по умолчанию для лимитов промпта. Переопределяются в конфиге
# конкретного сайта через `overrides:`, если нужно другое значение для сайта.
#
# v1.1: разделили лимиты на два типа осознанно —
#  - технические поля (Title/Meta/H1/ALT/Title изображения) получили ЖЁСТКИЕ
#    числа: модель гораздо лучше соблюдает ограничения, заданные цифрами, а эти
#    поля обрезаются в выдаче/интерфейсах при превышении, так что здесь точность важнее гибкости
#  - объём основного текста и количество FAQ вместо жёстких чисел получили
#    качественные ориентиры: жёсткое "150-250 слов" или "6-10 вопросов" на всех
#    страницах учит модель "дописывать воду" или искусственно резать текст ради
#    попадания в число — а поисковики оценивают полноту ответа, а не длину

seo_title_chars: "50-60"
meta_description_chars: "140-160"
h1_max_chars: 70
alt_max_chars: 125
image_title_chars: "40-70"

body_length_guidance: >
  Объём определяется темой, а не задан заранее. Обычно коммерческие страницы
  получаются 400-900 слов. Если тема раскрыта раньше — не добавляй воду. Если
  требуется больше объяснений — не сокращай текст искусственно. Поисковики
  оценивают полноту ответа, а не попадание в целевое число слов.

faq_guidance: >
  Обычно 4-6 вопросов. Меньше — если тема простая и не требует много
  уточнений. Больше — если это реально помогает пользователю (сложная тема,
  много типичных возражений). Не подгоняй количество под фиксированное число.

image_count: "5"
related_links_count: "3-5"
who_for_bullets: "3-5"
why_us_bullets: "2-4"
faq_answer_sentences: "2-4"
